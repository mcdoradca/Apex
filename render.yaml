# Kompletna definicja infrastruktury aplikacji APEX Predator
# Wersja z ostatnią zatwierdzoną przez Pana zmianą.

databases:
  # 1. Definicja usługi Bazy Danych PostgreSQL
  - name: apex-predator-db
    databaseName: apex_predator
    user: apex_user
    plan: Free
    region: frankfurt

services:
  # 2. Definicja usługi Bramy API (Web Service - Backend)
  - type: web
    name: apex-predator-api
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: ./api
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-predator-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.4"

  # 3. Definicja usługi Silnika Analitycznego (Background Worker)
  - type: worker
    name: apex-predator-worker
    runtime: python
    plan: starter
    region: frankfurt
    rootDir: ./worker
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m src.main" # POPRAWKA: Zmiana wprowadzona zgodnie z udzieloną zgodą.
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-predator-db
          property: connectionString
      - key: ALPHAVANTAGE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.4"
  
  # 4. Definicja usługi Frontendu (Static Site)
  - type: web
    name: apex-predator-frontend
    runtime: static
    plan: starter
    rootDir: ./
    # buildCommand został usunięty zgodnie z poprzednią logiką.
    staticPublishPath: ./ 
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

