# Kompletna definicja infrastruktury aplikacji APEX Predator
# Wersja finalna, ze strukturalnie poprawną definicją usług.

databases:
  # 1. Definicja usługi Bazy Danych PostgreSQL
  - name: apex-predator-db
    databaseName: apex_predator
    user: apex_user
    plan: starter # Plan płatny jest zalecany dla danych produkcyjnych
    region: frankfurt

services:
  # 2. Definicja usługi Bramy API (Web Service - Backend)
  - type: web
    name: apex-predator-api
    env: python
    plan: starter # Plan płatny jest zalecany, aby uniknąć usypiania usługi
    region: frankfurt
    rootDir: ./api
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-predator-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.4"

  # 3. Definicja usługi Silnika Analitycznego (Background Worker)
  - type: worker
    name: apex-predator-worker
    env: python
    plan: starter # Plan płatny jest KONIECZNY, aby worker działał w sposób ciągły
    region: frankfurt
    rootDir: ./worker
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python src/main.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-predator-db
          property: connectionString
      - key: ALPHAVANTAGE_API_KEY
        sync: false # Wartość zostanie ustawiona ręcznie jako sekret w panelu Render
      - key: PYTHON_VERSION
        value: "3.11.4"

# 4. POPRAWIONA SEKCJA: Definicja usługi Frontendu
staticSites:
  - name: apex-predator-frontend
    plan: starter
    region: frankfurt
    # Ta usługa będzie serwować pliki z głównego katalogu
    rootDir: ./
    # Render automatycznie znajdzie i opublikuje plik index.html
    # buildCommand nie jest potrzebny dla prostych stron statycznych
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

