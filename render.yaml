# Kompletna definicja infrastruktury aplikacji APEX Predator
# Wersja finalna, w pełni zgodna z dokumentacją Render Blueprint.

databases:
  # 1. Definicja usługi Bazy Danych PostgreSQL
  - name: apex-predator-db
    databaseName: apex_predator
    user: apex_user
    plan: Free # Plan płatny jest zalecany dla danych produkcyjnych
    region: frankfurt

services:
  # 2. Definicja usługi Bramy API (Web Service - Backend)
  - type: web
    name: apex-predator-api
    runtime: python
    plan: starter # Plan płatny jest zalecany, aby uniknąć usypiania usługi
    region: frankfurt
    rootDir: ./api
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn src.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-predator-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.4"

  # 3. Definicja usługi Silnika Analitycznego (Background Worker)
  - type: worker
    name: apex-predator-worker
    runtime: python
    plan: starter # Plan płatny jest KONIECZNY, aby worker działał w sposób ciągły
    region: frankfurt
    rootDir: ./worker
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python src/main.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: apex-predator-db
          property: connectionString
      - key: ALPHAVANTAGE_API_KEY
        sync: false # Wartość zostanie ustawiona ręcznie jako sekret w panelu Render
      - key: PYTHON_VERSION
        value: "3.11.4"
  
  # 4. OSTATECZNA POPRAWKA: Definicja usługi Frontendu (Static Site)
  - type: web
    name: apex-predator-frontend
    runtime: static
    rootDir: ./
    # buildCommand nie jest potrzebny, ponieważ nie ma etapu budowania (np. React, Vue)
    staticPublishPath: ./ # Wymagane dla runtime: static
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

