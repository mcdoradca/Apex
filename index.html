<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Predator - Analizator Nasdaq</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-static@latest/dist/lucide.min.js"></script>
    <link rel="icon" type="image/png" href="favicon-96x96.png">
    <meta name="referrer" content="no-referrer">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0D1117; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161B22; }
        ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 4px; }
        .sidebar-item-active { background-color: #1f2937; border-left: 3px solid #0ea5e9; color: #f0f0f0; }
        .sidebar-item { border-left: 3px solid transparent; }
        .candidate-item:hover { background-color: #1f2937; }
        .login-background { background-image: url('https://lh3.googleusercontent.com/d/1pIYmT4T0pZt8u-O7Ssjan5d_CITtgKBy'); background-size: cover; background-position: center; }
        .glowing-btn { box-shadow: 0 0 5px #0ea5e9, 0 0 15px #0ea5e9; }
        .lucide { stroke-width: 2; }
    </style>
</head>
<body class="text-gray-200">

    <!-- EKRAN LOGOWANIA / POCZEKALNIA -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center login-background bg-gray-900">
        <div class="bg-black bg-opacity-70 p-8 rounded-lg shadow-2xl backdrop-blur-sm w-full max-w-sm">
            <div class="text-center mb-6">
                <img src="https://lh3.googleusercontent.com/d/14xBoVSaztOmVy6rQ1u7yV_oS2K4Zq2U1" alt="Logo" class="w-24 mx-auto mb-3">
                <h1 class="text-2xl font-bold text-white">APEX Predator</h1>
                <p class="text-gray-400 text-sm">AI-Powered Nasdaq Intelligence</p>
            </div>
            <form id="login-form">
                <button type="submit" id="login-button" class="w-full bg-sky-600 text-white font-bold py-2 px-4 rounded-md transition duration-300 text-sm disabled:bg-gray-600 disabled:cursor-not-allowed glowing-btn" disabled>
                    Łączenie...
                </button>
                <p id="login-status-text" class="text-center text-gray-400 text-xs mt-4 h-4"></p>
            </form>
        </div>
    </div>

    <!-- GŁÓWNY DASHBOARD (UKRYTY) -->
    <div id="dashboard" class="h-screen flex hidden">
        <aside class="w-72 bg-[#161B22] p-4 flex flex-col shrink-0">
             
            <!-- SEKCJA GÓRNA (STAŁA) -->
            <div class="shrink-0">
                <div class="flex items-center mb-8">
                    <img src="https://lh3.googleusercontent.com/d/14xBoVSaztOmVy6rQ1u7yV_oS2K4Zq2U1" alt="Logo" class="w-10 h-10 mr-3">
                    <h1 class="text-xl font-bold">APEX Predator</h1>
                </div>
                <nav class="space-y-1">
                    <a href="#dashboard-view" class="sidebar-item sidebar-item-active flex items-center p-2 rounded-lg transition-colors"><i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i><span>Dashboard</span></a>
                </nav>
                 <div class="pt-4"><h2 class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Sterowanie</h2>
                    <div class="pl-2 mt-2 border-l border-gray-700 space-y-2">
                        <button id="start-btn" class="w-full text-left flex items-center bg-green-600/20 hover:bg-green-600/40 text-green-300 py-1.5 px-3 rounded-md text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"><i data-lucide="play" class="mr-2 h-4 w-4"></i>Start</button>
                        <button id="pause-btn" class="w-full text-left flex items-center bg-yellow-600/20 hover:bg-yellow-600/40 text-yellow-300 py-1.5 px-3 rounded-md text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"><i data-lucide="pause" class="mr-2 h-4 w-4"></i>Pauza</button>
                        <button id="resume-btn" class="w-full text-left flex items-center bg-sky-600/20 hover:bg-sky-600/40 text-sky-300 py-1.5 px-3 rounded-md text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"><i data-lucide="play-circle" class="mr-2 h-4 w-4"></i>Wznów</button>
                    </div>
                </div>
            </div>

            <!-- SEKCJA ŚRODKOWA (PRZEWIJALNA) -->
            <div id="phases-container" class="flex-grow overflow-y-auto space-y-4 py-4 mt-4 border-t border-gray-800">
                <h2 class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Wyniki Skanowania</h2>
                
                <!-- FAZA 1 -->
                <div class="px-2">
                    <button class="accordion-toggle flex justify-between items-center w-full text-left">
                        <p class="text-sm font-semibold text-gray-300">Faza 1: Kandydaci (<span id="phase-1-count">0</span>)</p>
                        <i data-lucide="chevron-down" class="accordion-icon w-5 h-5 transition-transform"></i>
                    </button>
                    <div id="phase-1-list" class="accordion-content mt-2 pl-2 border-l border-gray-700 space-y-1 hidden">
                        <p class="text-xs text-gray-500 p-2">Brak wyników.</p>
                    </div>
                </div>

                <!-- FAZA 2 -->
                 <div class="px-2">
                    <button class="accordion-toggle flex justify-between items-center w-full text-left">
                        <p class="text-sm font-semibold text-gray-300">Faza 2: APEX Elita (<span id="phase-2-count">0</span>)</p>
                        <i data-lucide="chevron-down" class="accordion-icon w-5 h-5 transition-transform"></i>
                    </button>
                    <div id="phase-2-list" class="accordion-content mt-2 pl-2 border-l border-gray-700 space-y-1 hidden">
                        <p class="text-xs text-gray-500 p-2">Brak wyników.</p>
                    </div>
                </div>

                <!-- FAZA 3 -->
                 <div class="px-2">
                    <button class="accordion-toggle flex justify-between items-center w-full text-left">
                        <p class="text-sm font-semibold text-gray-300">Faza 3: Sygnały (<span id="phase-3-count">0</span>)</p>
                        <i data-lucide="chevron-down" class="accordion-icon w-5 h-5 transition-transform"></i>
                    </button>
                    <div id="phase-3-list" class="accordion-content mt-2 pl-2 border-l border-gray-700 space-y-1 hidden">
                       <p class="text-xs text-gray-500 p-2">Brak wyników.</p>
                    </div>
                </div>
            </div>
            
            <!-- SEKCJA DOLNA (STAŁA) -->
            <div class="mt-auto shrink-0 border-t border-gray-800 pt-4">
                <h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Status Systemu</h3>
                <div class="space-y-2 text-sm">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">API Gateway:</span>
                        <span id="api-status" class="flex items-center text-gray-500"><span class="h-2 w-2 rounded-full bg-gray-500 mr-2"></span>Offline</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400">Silnik:</span>
                        <span id="worker-status-text" class="font-mono bg-gray-700 text-gray-200 px-2 py-1 rounded-md text-xs">IDLE</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 bg-[#0D1117] flex flex-col overflow-y-auto">
            <header class="p-4 border-b border-gray-800 shrink-0"><div class="max-w-xl mx-auto"><div class="relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i><input id="ticker-input" type="text" placeholder="Wpisz ticker (np. AAPL) i naciśnij Enter, aby uruchomić analizę na żądanie" class="w-full bg-[#161B22] border border-gray-700 rounded-md pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-500"></div></div></header>
            
            <div id="main-content" class="p-6 flex-grow">
                <!-- Dynamiczna zawartość będzie renderowana tutaj -->
            </div>
        </main>
    </div>

    <script>
        // --- GLOBALNY STAN APLIKACJI ---
        const state = {
            phase1: [], phase2: [], phase3: [],
            workerStatus: {},
            onDemandPollingId: null,
            livePricePollingId: null,
            dataPollingId: null,
            activeView: 'dashboard',
            activeTicker: null,
        };

        // --- ELEMENTY UI ---
        const ui = {
            loginScreen: document.getElementById('login-screen'),
            dashboardScreen: document.getElementById('dashboard'),
            loginForm: document.getElementById('login-form'),
            loginButton: document.getElementById('login-button'),
            loginStatusText: document.getElementById('login-status-text'),
            mainContent: document.getElementById('main-content'),
            tickerInput: document.getElementById('ticker-input'),
            startBtn: document.getElementById('start-btn'),
            pauseBtn: document.getElementById('pause-btn'),
            resumeBtn: document.getElementById('resume-btn'),
            apiStatus: document.getElementById('api-status'),
            workerStatusText: document.getElementById('worker-status-text'),
            phase1: { list: document.getElementById('phase-1-list'), count: document.getElementById('phase-1-count') },
            phase2: { list: document.getElementById('phase-2-list'), count: document.getElementById('phase-2-count') },
            phase3: { list: document.getElementById('phase-3-list'), count: document.getElementById('phase-3-count') },
        };

        // --- LOGIKA API ---
        const API_BASE_URL = "https://apex-predator-api.onrender.com";
        const apiRequest = async (endpoint, options = {}) => {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
            if (response.status === 204 || response.headers.get("Content-Length") === "0") return null;
            if (!response.ok) throw new Error(`Błąd serwera: ${response.status}`);
            return await response.json();
        };

        const api = {
            getWorkerStatus: () => apiRequest('/api/v1/worker/status'),
            sendWorkerControl: (action) => apiRequest(`/api/v1/worker/control/${action}`, { method: 'POST' }),
            getPhase1Candidates: () => apiRequest('/api/v1/candidates/phase1'),
            deletePhase1Candidate: (ticker) => apiRequest(`/api/v1/candidates/phase1/${ticker}`, { method: 'DELETE' }),
            getPhase2Results: () => apiRequest('/api/v1/results/phase2'),
            deletePhase2Result: (ticker) => apiRequest(`/api/v1/results/phase2/${ticker}`, { method: 'DELETE' }),
            getPhase3Signals: () => apiRequest('/api/v1/signals/phase3'),
            deletePhase3Signal: (id) => apiRequest(`/api/v1/signals/phase3/${id}`, { method: 'DELETE' }),
            getConsolidatedDetails: (ticker) => apiRequest(`/api/v1/details/${ticker}`),
            requestOnDemandAnalysis: (ticker) => apiRequest(`/api/v1/analysis/on-demand`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ticker }) }),
            getOnDemandResult: (ticker) => apiRequest(`/api/v1/analysis/on-demand/result/${ticker}`),
            requestPhase3OnDemand: (ticker) => apiRequest(`/api/v1/analysis/phase3-on-demand`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ticker }) }),
            getPhase3OnDemandResult: (ticker) => apiRequest(`/api/v1/analysis/phase3-on-demand/result/${ticker}`),
            getLivePrices: (tickers) => apiRequest(`/api/v1/live-prices?tickers=${tickers.join(',')}`)
        };

        // --- FUNKCJE RENDERUJĄCE ---
        const renderers = {
            loading: (text) => `<div class="text-center py-10"><div role="status"><svg aria-hidden="true" class="inline w-8 h-8 text-gray-600 animate-spin fill-sky-500" viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z" fill="currentColor"/><path d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z" fill="currentFill"/></svg><p class="text-sky-400 mt-4">${text}</p></div>`,
            error: (title, message) => `<div class="bg-red-900/20 border border-red-500/30 text-red-300 p-6 rounded-lg text-center"><h2 class="text-2xl font-bold mb-2">${title}</h2><p>${message}</p></div>`,
            dashboard: () => `
                <div class="bg-[#161B22] p-6 rounded-lg border border-gray-800">
                    <h3 class="text-xl font-semibold mb-4">Status Skanowania Rynku</h3>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between"><span class="text-gray-400">Aktualna faza:</span><span id="worker-phase" class="font-mono bg-gray-700 text-gray-200 px-2 py-1 rounded-md text-sm"></span></div>
                        <div>
                            <div class="flex justify-between mb-1"><span class="text-base font-medium text-gray-400">Postęp</span><span id="progress-text" class="text-sm font-medium text-gray-400"></span></div>
                            <div class="w-full bg-gray-700 rounded-full h-2.5"><div id="progress-bar" class="bg-sky-500 h-2.5 rounded-full" style="width: 0%"></div></div>
                        </div>
                    </div>
                    <div class="mt-4"><h4 class="text-md font-semibold text-gray-400 mb-2">Log Skanowania</h4><div id="scan-log" class="h-96 bg-black/50 p-3 rounded-md overflow-y-auto font-mono text-xs text-gray-400 border border-gray-700"></div></div>
                </div>`,
            phase1List: (candidates) => {
                if (!candidates || candidates.length === 0) return `<p class="text-xs text-gray-500 p-2">Brak wyników.</p>`;
                return candidates.map(c => `
                    <div class="candidate-item flex justify-between items-center p-2 rounded-md cursor-pointer text-sm" data-action="view-details" data-ticker="${c.ticker}">
                        <div>
                            <span class="font-bold">${c.ticker}</span>
                            <span id="price-${c.ticker}" class="text-gray-400 ml-2">${c.price ? `$${c.price.toFixed(2)}` : '...'}</span>
                        </div>
                        <div class="flex items-center space-x-2">
                           <button class="p-1 text-gray-500 hover:text-sky-400" title="Uruchom analizę Predator (Faza 3)" data-action="run-predator" data-ticker="${c.ticker}"><i data-lucide="crosshair" class="w-4 h-4 pointer-events-none"></i></button>
                           <button class="p-1 text-gray-500 hover:text-red-500" title="Usuń" data-action="delete-p1" data-ticker="${c.ticker}"><i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i></button>
                        </div>
                    </div>`).join('');
            },
            phase2List: (results) => {
                 if (!results || results.length === 0) return `<p class="text-xs text-gray-500 p-2">Brak wyników.</p>`;
                 return results.map(r => `
                    <div class="candidate-item flex justify-between items-center p-2 rounded-md cursor-pointer text-sm" data-action="view-details" data-ticker="${r.ticker}">
                        <div>
                            <span class="font-bold">${r.ticker}</span>
                            <span class="text-gray-400 ml-2">Score: ${r.total_score}</span>
                            <span id="price-${r.ticker}" class="text-sky-400 ml-2">...</span>
                        </div>
                        <div class="flex items-center space-x-2">
                           <button class="p-1 text-gray-500 hover:text-sky-400" title="Uruchom analizę Predator (Faza 3)" data-action="run-predator" data-ticker="${r.ticker}"><i data-lucide="crosshair" class="w-4 h-4 pointer-events-none"></i></button>
                           <button class="p-1 text-gray-500 hover:text-red-500" title="Usuń" data-action="delete-p2" data-ticker="${r.ticker}"><i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i></button>
                        </div>
                    </div>`).join('');
            },
            phase3List: (signals) => {
                if (!signals || signals.length === 0) return `<p class="text-xs text-gray-500 p-2">Brak wyników.</p>`;
                return signals.map(s => `
                    <div class="candidate-item flex justify-between items-center p-2 rounded-md cursor-pointer text-sm" data-action="view-details" data-ticker="${s.ticker}">
                        <div>
                            <span class="font-bold">${s.ticker}</span>
                             <span id="price-${s.ticker}" class="text-sky-400 ml-2">...</span>
                        </div>
                        <div class="flex items-center space-x-2">
                           <button class="p-1 text-gray-500 hover:text-red-500" title="Usuń" data-action="delete-p3" data-id="${s.id}"><i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i></button>
                        </div>
                    </div>`).join('');
            }
        };

        // --- GŁÓWNA LOGIKA APLIKACJI ---
        
        function updateWorkerStatusUI() {
            const data = state.workerStatus;
            ui.apiStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-green-500 mr-2"></span>Online`;
            ui.workerStatusText.textContent = data.status || 'N/A';
            
            ui.startBtn.disabled = data.status === 'RUNNING';
            ui.pauseBtn.disabled = data.status !== 'RUNNING';
            ui.resumeBtn.disabled = data.status !== 'PAUSED';

            const dashboardPhase = document.getElementById('worker-phase');
            if (dashboardPhase) {
                dashboardPhase.textContent = data.phase || 'N/A';
                const processed = data.progress?.processed || 0;
                const total = data.progress?.total || 0;
                document.getElementById('progress-text').textContent = `${processed} / ${total}`;
                document.getElementById('progress-bar').style.width = `${total > 0 ? (processed / total) * 100 : 0}%`;
                const logEl = document.getElementById('scan-log');
                if (logEl && data.log && logEl.innerHTML !== data.log.replace(/\n/g, '<br>')) {
                    logEl.innerHTML = data.log.replace(/\n/g, '<br>');
                    logEl.scrollTop = logEl.scrollHeight;
                }
            }
        };
        
        async function pollWorkerStatus() {
            try {
                const oldStatus = state.workerStatus ? state.workerStatus.status : null;
                state.workerStatus = await api.getWorkerStatus();
                updateWorkerStatusUI();
            } catch (e) {
                ui.apiStatus.innerHTML = `<span class="h-2 w-2 rounded-full bg-red-500 mr-2"></span>Offline`;
            }
        };

        async function refreshAllData() {
            try {
                const [p1, p2, p3] = await Promise.all([
                    api.getPhase1Candidates(),
                    api.getPhase2Results(),
                    api.getPhase3Signals()
                ]);
                
                state.phase1 = p1 || [];
                state.phase2 = p2 || [];
                state.phase3 = p3 || [];

                ui.phase1.list.innerHTML = renderers.phase1List(state.phase1);
                ui.phase2.list.innerHTML = renderers.phase2List(state.phase2);
                ui.phase3.list.innerHTML = renderers.phase3List(state.phase3);
                
                ui.phase1.count.textContent = state.phase1.length;
                ui.phase2.count.textContent = state.phase2.length;
                ui.phase3.count.textContent = state.phase3.length;
                
                lucide.createIcons();
            } catch (e) {
                console.error("Failed to refresh scan data", e);
            }
        }
        
        async function updateLivePrices() {
            const tickers = [...new Set([...state.phase1.map(c => c.ticker), ...state.phase2.map(r => r.ticker), ...state.phase3.map(s => s.ticker)])];
            if (tickers.length === 0) return;
            
            try {
                const prices = await api.getLivePrices(tickers);
                if (!prices) return;
                
                prices.forEach(p => {
                    const priceEl = document.getElementById(`price-${p.ticker}`);
                    if (priceEl) {
                        priceEl.textContent = `$${p.price.toFixed(2)}`;
                    }
                });
            } catch(e) {
                console.error("Failed to update live prices", e);
            }
        }
        
        async function showDetails(ticker) {
            state.activeView = 'details';
            state.activeTicker = ticker;
            ui.mainContent.innerHTML = renderers.loading(`Ładowanie szczegółów dla ${ticker}...`);
            try {
                const data = await api.getConsolidatedDetails(ticker);
                // Tutaj będzie renderowanie widoku szczegółów
                ui.mainContent.innerHTML = `<pre class="text-xs">${JSON.stringify(data, null, 2)}</pre>`;
            } catch(e) {
                ui.mainContent.innerHTML = renderers.error('Błąd Ładowania Danych', e.message);
            }
            lucide.createIcons();
        }


        // --- LOGIKA STARTOWA I OBSŁUGA ZDARZEŃ ---
        function startDashboard() {
            ui.loginScreen.classList.add('hidden');
            ui.dashboardScreen.classList.remove('hidden');
            lucide.createIcons();
            
            ui.mainContent.innerHTML = renderers.dashboard();
            lucide.createIcons();
            
            pollWorkerStatus();
            refreshAllData();

            // Uruchomienie cyklicznego odpytywania
            state.dataPollingId = setInterval(async () => {
                await pollWorkerStatus();
                // Odświeżaj dane tylko jeśli worker jest bezczynny, żeby nie nadpisywać w trakcie skanu
                if (state.workerStatus.status === 'IDLE') {
                    await refreshAllData();
                }
            }, 5000);
            
            state.livePricePollingId = setInterval(updateLivePrices, 5000);

            // Event Listeners dla przycisków
            ui.startBtn.addEventListener('click', async () => {
                await api.sendWorkerControl('start');
                pollWorkerStatus();
            });
            ui.pauseBtn.addEventListener('click', () => api.sendWorkerControl('pause'));
            ui.resumeBtn.addEventListener('click', () => api.sendWorkerControl('resume'));

            document.getElementById('phases-container').addEventListener('click', async (e) => {
                const target = e.target.closest('[data-action]');
                if (!target) return;
                
                const { action, ticker, id } = target.dataset;

                if (action === 'view-details') {
                    showDetails(ticker);
                } else if (action === 'delete-p1') {
                    if (confirm(`Czy na pewno chcesz usunąć ${ticker} z Fazy 1?`)) {
                        await api.deletePhase1Candidate(ticker);
                        refreshAllData();
                    }
                } else if (action === 'delete-p2') {
                    if (confirm(`Czy na pewno chcesz usunąć ${ticker} z Fazy 2?`)) {
                        await api.deletePhase2Result(ticker);
                        refreshAllData();
                    }
                } else if (action === 'delete-p3') {
                     if (confirm(`Czy na pewno chcesz usunąć sygnał #${id}?`)) {
                        await api.deletePhase3Signal(id);
                        refreshAllData();
                    }
                } else if (action === 'run-predator') {
                    alert(`Uruchamianie analizy Predator dla ${ticker}...`);
                    // TODO: Dodać logikę
                }
            });
            
            ui.tickerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    const ticker = e.target.value.trim().toUpperCase();
                    if (ticker) {
                        // TODO: Logika analizy na żądanie
                        alert(`Uruchamianie analizy na żądanie dla ${ticker}...`)
                        e.target.value = '';
                    }
                }
            });
            
            // Accordion logic
            document.querySelectorAll('.accordion-toggle').forEach(button => {
                button.addEventListener('click', () => {
                    const content = button.nextElementSibling;
                    const icon = button.querySelector('.accordion-icon');
                    content.classList.toggle('hidden');
                    icon.classList.toggle('rotate-180');
                });
            });
        }
        
        async function checkBackendReady() {
            ui.loginStatusText.textContent = 'Oczekiwanie na uruchomienie usług backendu...';
            try {
                await api.getWorkerStatus();
                ui.loginStatusText.textContent = 'System gotowy.';
                ui.loginButton.disabled = false;
                ui.loginButton.textContent = 'Wejdź do Aplikacji';
            } catch (e) {
                setTimeout(checkBackendReady, 3000);
            }
        }

        ui.loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            startDashboard();
        });

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            checkBackendReady();
        });
    </script>
</body>
</html>
