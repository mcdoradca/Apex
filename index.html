<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Predator - Analizator Nasdaq</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="favicon-96x96.png">
    <meta name="referrer" content="no-referrer">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0D1117; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161B22; }
        ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 4px; }
        .sidebar-item-active { background-color: #1f2937; border-left: 3px solid #0ea5e9; color: #f0f0f0; }
        .sidebar-item { border-left: 3px solid transparent; }
        .candidate-item:hover { background-color: #1f2937; }
        .login-background { 
            background-image: url('https://lh3.googleusercontent.com/d/1pIYmT4T0pZt8u-O7Ssjan5d_CITtgKBy'); 
            background-size: cover; 
            background-position: center; 
        }
        .glowing-btn { box-shadow: 0 0 5px #0ea5e9, 0 0 15px #0ea5e9; }
        .red-dot { background-color: #ef4444; }
        .green-dot { background-color: #22c55e; }
        .yellow-dot { background-color: #eab308; }
        .phase-1-text { color: #8b5cf6; }
        .phase-2-text { color: #f59e0b; }
        .phase-3-text { color: #ef4444; }
        .alert-bar { 
            position: fixed; top: 0; left: 0; right: 0; z-index: 1000; 
            padding: 1rem; text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="text-gray-200">
    
    <div id="system-alert-container"></div>
    <div id="login-screen" class="min-h-screen flex items-center justify-center login-background bg-gray-900">
        <!-- Ekran logowania -->
    </div>

    <div id="dashboard" class="h-screen flex hidden">
        <aside class="w-72 bg-[#161B22] p-4 flex flex-col shrink-0">
            <!-- Pasek boczny -->
        </aside>

        <main class="flex-1 bg-[#0D1117] flex flex-col overflow-y-auto">
            <header class="p-4 border-b border-gray-800 shrink-0">
                <div class="max-w-xl mx-auto">
                    <div class="relative">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i>
                        <input id="ticker-input" type="text" placeholder="Wpisz ticker (np. AAPL) i naciśnij Enter..." class="w-full bg-[#161B22] border border-gray-700 rounded-md pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-500">
                    </div>
                </div>
            </header>
            
            <div id="main-content" class="p-6 flex-grow">
                <!-- Dynamiczna zawartość -->
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ... (inicjalizacja state i ui)
            const state = { /* ... */ };
            const ui = { /* ... */ };
            
            const API_BASE_URL = "https://apex-predator-api.onrender.com";
            
            const logger = {
                error: (message, error) => console.error(message, error),
                warn: (message) => console.warn(message),
                info: (message) => console.log(message),
            };

            const apiRequest = async (endpoint, options = {}) => { /* ... */ };
            const api = { /* ... */ };
            const renderers = { /* ... */ };
            
            async function pollSystemAlerts() { /* ... */ }
            function updateWorkerStatusUI(statusData) { /* ... */ }
            async function pollWorkerStatus() { /* ... */ }

            async function pollOnDemandResults(ticker) {
                if (!state.activePolling.has(ticker)) return;

                const data = await api.getConsolidatedDetails(ticker);
                const isOndemandProcessing = data.on_demand_analysis?.message === 'PROCESSING';
                const isPhase3Processing = data.phase3_on_demand_analysis?.message === 'PROCESSING';
                
                if (document.getElementById(`ticker-details-${ticker}`)) {
                    document.getElementById('main-content').innerHTML = renderers.consolidatedDetails(ticker, data);
                    lucide.createIcons();
                }

                if (isOndemandProcessing || isPhase3Processing) {
                    setTimeout(() => pollOnDemandResults(ticker), 3000);
                } else {
                    state.activePolling.delete(ticker);
                    logger.info(`Polling for ${ticker} ended.`);
                    // Po zakończeniu odświeżamy dane, aby zaktualizować sidebar
                    refreshAllData();
                }
            }

            async function refreshAllData() { /* ... */ }
            
            // *** NOWA FUNKCJA SPRAWDZAJĄCA GODZINY HANDLU ***
            function isNasdaqOpen() {
                const now = new Date();
                const userTimezoneOffset = now.getTimezoneOffset() * 60000;
                const utc = now.getTime() + userTimezoneOffset;
                const estOffset = -4 * 3600000; // EDT (letni czas wschodni)
                const estTime = new Date(utc + estOffset);

                const dayOfWeek = estTime.getUTCDay(); // 0 = niedziela, 1 = poniedziałek
                const hour = estTime.getUTCHours();
                const minute = estTime.getUTCMinutes();

                // Giełda otwarta od poniedziałku do piątku
                if (dayOfWeek >= 1 && dayOfWeek <= 5) {
                    // Godziny handlu: 9:30 - 16:00 czasu wschodniego
                    if ((hour > 9 || (hour === 9 && minute >= 30)) && hour < 16) {
                        return true;
                    }
                }
                return false;
            }

            // *** POPRAWIONA FUNKCJA ODŚWIEŻANIA CEN ***
            async function updateLivePrices() {
                if (!isNasdaqOpen()) {
                    logger.info("Giełda Nasdaq jest zamknięta. Wstrzymuję odświeżanie cen.");
                    setTimeout(updateLivePrices, 60000); // Sprawdź ponownie za minutę
                    return;
                }

                const allTickers = new Set([ /* ... */ ]);
                const tickers = Array.from(allTickers);
                if (tickers.length === 0) {
                    setTimeout(updateLivePrices, 5000);
                    return;
                }

                try {
                    const livePrices = await api.getLivePrices(tickers);
                    renderers.updateLivePricesOnLists(livePrices);
                } catch (e) {
                    logger.warn("Nie można pobrać cen na żywo:", e);
                }
                
                setTimeout(updateLivePrices, 5000);
            }

            async function showDetails(ticker, skipLoading = false) { /* ... */ }
            function startDashboard() { /* ... */ }
            function showDashboardView() { /* ... */ }
            function handleWorkerControl(action) { /* ... */ }
            
            document.querySelector('#phases-container').addEventListener('click', (e) => { /* ... */ });

            // *** POPRAWIONA OBSŁUGA ZDARZEŃ DLA "ANALIZY NA ŻĄDANIE" ***
            ui.mainContent.addEventListener('click', async (e) => {
                const onDemandBtn = e.target.closest('.request-on-demand-btn');
                const phase3Btn = e.target.closest('.request-phase3-on-demand-btn');
                
                async function handleRequest(button, apiCall, ticker) {
                    if (!button || button.disabled) return;
                    try {
                        button.disabled = true;
                        button.textContent = 'Wysyłanie...';
                        logger.info(`Requesting analysis for ${ticker}`);
                        
                        await apiCall(ticker);
                        
                        // Natychmiastowe odświeżenie widoku, aby pokazać status "PROCESSING"
                        await showDetails(ticker, true);
                        
                        // Rozpoczęcie odpytywania w tle
                        if (!state.activePolling.has(ticker)) {
                            state.activePolling.add(ticker);
                            pollOnDemandResults(ticker);
                        }
                    } catch (err) {
                        logger.error(`Błąd podczas zlecenia analizy dla ${ticker}:`, err);
                        button.disabled = false;
                        button.textContent = 'Błąd! Spróbuj ponownie';
                    }
                }

                if (onDemandBtn) {
                    await handleRequest(onDemandBtn, api.requestOnDemandAnalysis, onDemandBtn.dataset.ticker);
                }
                
                if (phase3Btn) {
                    await handleRequest(phase3Btn, api.requestPhase3OnDemand, phase3Btn.dataset.ticker);
                }
            });

            ui.tickerInput.addEventListener('keydown', (e) => { /* ... */ });
            ui.dashboardLink.addEventListener('click', showDashboardView);
            ui.startBtn.addEventListener('click', handleWorkerControl('start'));
            ui.pauseBtn.addEventListener('click', handleWorkerControl('pause'));
            ui.resumeBtn.addEventListener('click', handleWorkerControl('resume'));
            
            function checkBackendReady() { /* ... */ }
            ui.loginForm.addEventListener('submit', (e) => { e.preventDefault(); startDashboard(); });
            checkBackendReady();
            lucide.createIcons();
        });
    </script>
</body>
</html>
