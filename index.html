<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Predator - Analizator Nasdaq</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="shortcut icon" href="favicon.ico">
    <link rel="icon" type="image/png" href="/favicon-96x96.png">
    <meta name="referrer" content="no-referrer">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display.swap');
        body { font-family: 'Inter', sans-serif; background-color: #0D1117; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #161B22; }
        ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 4px; }
        .sidebar-item-active { background-color: #1f2937; border-left: 3px solid #0ea5e9; color: #f0f0f0; }
        .sidebar-item { border-left: 3px solid transparent; }
        .candidate-item:hover { background-color: #1f2937; }
        .login-background { background-image: url('https://lh3.googleusercontent.com/d/1pIYmT4T0pZt8u-O7Ssjan5d_CITtgKBy'); background-size: cover; background-position: center; }
        .glowing-btn { box-shadow: 0 0 5px #0ea5e9, 0 0 15px #0ea5e9; }
    </style>
</head>
<body class="text-gray-200">

    <!-- EKRAN LOGOWANIA / POCZEKALNIA (PRZYWRÓCONY) -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center login-background bg-gray-900">
        <div class="bg-black bg-opacity-70 p-8 rounded-lg shadow-2xl backdrop-blur-sm w-full max-w-sm">
            <div class="text-center mb-6">
                <img src="https://lh3.googleusercontent.com/d/14xBoVSaztOmVy6rQ1u7yV_oS2K4Zq2U1" alt="Logo" class="w-24 mx-auto mb-3">
                <h1 class="text-2xl font-bold text-white">APEX Predator</h1>
                <p class="text-gray-400 text-sm">AI-Powered Nasdaq Intelligence</p>
            </div>
            <form id="login-form">
                <button type="submit" id="login-button" class="w-full bg-sky-600 text-white font-bold py-2 px-4 rounded-md transition duration-300 text-sm disabled:bg-gray-600 disabled:cursor-not-allowed glowing-btn" disabled>
                    Łączenie...
                </button>
                <p id="login-status-text" class="text-center text-gray-400 text-xs mt-4 h-4"></p>
            </form>
        </div>
    </div>

    <!-- GŁÓWNY DASHBOARD (UKRYTY) -->
    <div id="dashboard" class="h-screen flex hidden">
        <aside class="w-72 bg-[#161B22] p-4 flex flex-col shrink-0">
             <div class="flex items-center mb-8">
                <img src="https://lh3.googleusercontent.com/d/14xBoVSaztOmVy6rQ1u7yV_oS2K4Zq2U1" alt="Logo" class="w-10 h-10 mr-3">
                <h1 class="text-xl font-bold">APEX Predator</h1>
            </div>
            <nav id="sidebar-nav" class="flex-grow space-y-1">
                <a href="#dashboard-view" class="sidebar-item sidebar-item-active flex items-center p-2 rounded-lg transition-colors"><i data-lucide="layout-dashboard" class="mr-3 w-5 h-5"></i><span>Dashboard</span></a>
                
                <div class="pt-4"><h2 class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Sterowanie</h2>
                    <div class="pl-2 mt-2 border-l border-gray-700">
                        <p class="text-sm font-semibold text-gray-300 mb-2">Pełen Cykl</p>
                        <div class="flex flex-col space-y-2">
                            <button id="start-btn" class="w-full text-left flex items-center bg-green-600/20 hover:bg-green-600/40 text-green-300 py-1 px-3 rounded-md text-sm transition-colors disabled:opacity-50 disabled:cursor-not-allowed"><i data-lucide="play" class="mr-2 h-4 w-4"></i>Start</button>
                        </div>
                    </div>
                </div>

                <div class="pt-4"><h2 class="px-2 text-xs font-semibold text-gray-500 uppercase tracking-wider">Wyniki Analizy</h2>
                    <div id="candidates-container" class="pl-2 mt-2 border-l border-gray-700">
                        <div class="flex justify-between items-center mb-2">
                            <p class="text-sm font-semibold text-gray-300">Kandydaci Fazy 1</p>
                            <button id="refresh-candidates-btn" title="Odśwież listę" class="p-1 text-gray-400 hover:text-sky-400 disabled:opacity-50"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                        </div>
                        <div id="candidates-list" class="max-h-48 overflow-y-auto pr-2 space-y-1">
                            <p class="text-xs text-gray-500 px-2">Brak kandydatów.</p>
                        </div>
                    </div>
                </div>
            </nav>
            <div class="mt-auto"><h3 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Status Systemu</h3><div class="space-y-2 text-sm"><div class="flex justify-between items-center"><span class="text-gray-400">API Gateway:</span><span id="api-status" class="flex items-center text-gray-500"><span class="h-2 w-2 rounded-full bg-gray-500 mr-2"></span>Offline</span></div><div class="flex justify-between items-center"><span class="text-gray-400">Silnik:</span><span id="worker-status-text" class="font-mono bg-gray-700 text-gray-200 px-2 py-1 rounded-md text-xs">IDLE</span></div></div></div>
        </aside>

        <main class="flex-1 bg-[#0D1117] flex flex-col overflow-y-auto">
            <header class="p-4 border-b border-gray-800 shrink-0"><div class="max-w-xl mx-auto"><div class="relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 w-5 h-5"></i><input id="ticker-input" type="text" placeholder="Wpisz ticker (np. AAPL) i naciśnij Enter" class="w-full bg-[#161B22] border border-gray-700 rounded-md pl-10 pr-4 py-2 focus:outline-none focus:ring-2 focus:ring-sky-500"></div></div></header>
            
            <div id="main-content" class="p-6 flex-grow">
                <!-- Dynamiczna zawartość będzie renderowana tutaj -->
            </div>
        </main>
    </div>

    <script>
        // --- GLOBALNY STAN APLIKACJI ---
        const state = {
            candidates: [],
            workerStatus: {},
            onDemandPollingId: null,
            workerStatusPollingId: null
        };

        // --- ELEMENTY UI ---
        const loginScreen = document.getElementById('login-screen');
        const dashboardScreen = document.getElementById('dashboard');
        const loginForm = document.getElementById('login-form');
        const loginButton = document.getElementById('login-button');
        const loginStatusText = document.getElementById('login-status-text');
        
        const mainContentEl = document.getElementById('main-content');
        const candidatesListEl = document.getElementById('candidates-list');
        const startBtn = document.getElementById('start-btn');
        const refreshCandidatesBtn = document.getElementById('refresh-candidates-btn');
        const tickerInput = document.getElementById('ticker-input');

        // --- LOGIKA API ---
        const API_BASE_URL = "https://apex-predator-api.onrender.com";
        const apiRequest = async (endpoint, options = {}) => {
            const response = await fetch(`${API_BASE_URL}${endpoint}`, options);
            if (response.status === 204 || response.headers.get("Content-Length") === "0") return null;
            if (!response.ok) throw new Error(`Błąd serwera: ${response.status}`);
            return await response.json();
        };
        const fetchWorkerStatus = () => apiRequest('/api/v1/worker/status');
        const fetchPhase1Candidates = () => apiRequest('/api/v1/candidates/phase1');
        const deletePhase1Candidate = (ticker) => apiRequest(`/api/v1/candidates/phase1/${ticker}`, { method: 'DELETE' });
        const sendWorkerControl = (action) => apiRequest(`/api/v1/worker/control/${action}`, { method: 'POST' });
        const requestOnDemandAnalysis = (ticker) => apiRequest(`/api/v1/analysis/on-demand`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ticker }) });
        const fetchOnDemandResult = (ticker) => apiRequest(`/api/v1/analysis/on-demand/result/${ticker}`);

        // --- FUNKCJE RENDERUJĄCE ---
        const renderLoading = (text) => `...`;
        const renderError = (title, message) => `...`;
        // ... (reszta funkcji renderujących bez zmian)
        const renderDashboard = () => {
            return `
            <div class="bg-[#161B22] p-6 rounded-lg border border-gray-800">
                <h3 class="text-xl font-semibold mb-4">Status Skanowania Rynku</h3>
                <div class="space-y-3">
                    <div class="flex items-center justify-between"><span class="text-gray-400">Aktualna faza:</span><span id="worker-phase" class="font-mono bg-gray-700 text-gray-200 px-2 py-1 rounded-md text-sm"></span></div>
                    <div>
                        <div class="flex justify-between mb-1"><span class="text-base font-medium text-gray-400">Postęp</span><span id="progress-text" class="text-sm font-medium text-gray-400"></span></div>
                        <div class="w-full bg-gray-700 rounded-full h-2.5"><div id="progress-bar" class="bg-sky-500 h-2.5 rounded-full" style="width: 0%"></div></div>
                    </div>
                </div>
                <div class="mt-4"><h4 class="text-md font-semibold text-gray-400 mb-2">Log Skanowania</h4><div id="scan-log" class="h-96 bg-black/50 p-3 rounded-md overflow-y-auto font-mono text-xs text-gray-400 border border-gray-700"></div></div>
            </div>`;
        };
        const renderCandidateDetails = (candidate) => { /* ... bez zmian ... */ };
        const renderOnDemandResults = (data, containerSelector) => { /* ... bez zmian ... */ };
        

        // --- GŁÓWNA LOGIKA APLIKACJI ---
        const updateCandidatesList = () => {
            if (!state.candidates || state.candidates.length === 0) {
                candidatesListEl.innerHTML = `<p class="text-xs text-gray-500 px-2">Brak kandydatów.</p>`;
                return;
            }
            // Sortowanie od najwyższego wyniku
            state.candidates.sort((a, b) => b.score - a.score);
            
            candidatesListEl.innerHTML = state.candidates.map(c => `
                <div class="candidate-item flex justify-between items-center p-2 rounded-md cursor-pointer" data-ticker="${c.ticker}">
                    <div class="flex items-center">
                        <span class="font-bold text-sm">${c.ticker}</span>
                        <span class="text-xs text-gray-400 ml-2">(Score: ${c.score})</span>
                    </div>
                    <button class="delete-btn p-1 text-gray-500 hover:text-red-500" data-ticker="${c.ticker}" title="Usuń"><i data-lucide="trash-2" class="w-4 h-4 pointer-events-none"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const refreshCandidates = async () => {
            refreshCandidatesBtn.disabled = true;
            try {
                state.candidates = await fetchPhase1Candidates() || [];
                updateCandidatesList();
            } catch (e) {
                console.error("Failed to refresh candidates", e);
            } finally {
                refreshCandidatesBtn.disabled = false;
            }
        };

        const updateWorkerStatusUI = () => { /* ... (bez zmian, logika aktualizacji UI dashboardu) ... */ };
        
        const pollWorkerStatus = async () => { /* ... (bez zmian, logika odpytywania o status) ... */ };

        const startOnDemandAnalysis = async (ticker, containerSelector) => { /* ... (bez zmian, logika analizy na żądanie) ... */ };

        // --- LOGIKA STARTOWA I LOGOWANIA ---
        function startDashboard() {
            loginScreen.classList.add('hidden');
            dashboardScreen.classList.remove('hidden');
            lucide.createIcons();
            
            mainContentEl.innerHTML = renderDashboard();
            lucide.createIcons();
            updateWorkerStatusUI();
            
            refreshCandidates();
            state.workerStatusPollingId = setInterval(pollWorkerStatus, 5000);

            // Rejestracja event listenerów dla działającego dashboardu
            startBtn.addEventListener('click', async () => { /* ... */ });
            refreshCandidatesBtn.addEventListener('click', refreshCandidates);
            candidatesListEl.addEventListener('click', async (e) => {
                 const deleteBtn = e.target.closest('.delete-btn');
                 if (deleteBtn) {
                     e.stopPropagation();
                     const ticker = deleteBtn.dataset.ticker;
                     if (confirm(`Czy na pewno chcesz usunąć ${ticker} z listy kandydatów?`)) {
                         await deletePhase1Candidate(ticker);
                         await refreshCandidates();
                         if (mainContentEl.querySelector(`[data-ticker-details="${ticker}"]`)) {
                             mainContentEl.innerHTML = renderDashboard();
                             lucide.createIcons();
                             updateWorkerStatusUI();
                         }
                     }
                 } else if (e.target.closest('.candidate-item')) {
                     const ticker = e.target.closest('.candidate-item').dataset.ticker;
                     // Logika wyświetlania szczegółów...
                 }
            });
            tickerInput.addEventListener('keypress', (e) => { /* ... */ });
            document.querySelector('a[href="#dashboard-view"]').addEventListener('click', (e) => { /* ... */ });
        }
        
        function checkBackendReady() {
            loginStatusText.textContent = 'Oczekiwanie na uruchomienie usług backendu...';
            const intervalId = setInterval(async () => {
                try {
                    await fetchWorkerStatus();
                    clearInterval(intervalId);
                    loginStatusText.textContent = 'System gotowy.';
                    loginButton.disabled = false;
                    loginButton.textContent = 'Zaloguj się';
                } catch (e) {
                    // Czekaj dalej...
                }
            }, 3000);
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            startDashboard();
        });

        document.addEventListener('DOMContentLoaded', checkBackendReady);
    </script>
</body>
</html>
